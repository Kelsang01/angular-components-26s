<mat-card appearance="outlined">
    <mat-card-header>
        <mat-card-title>Incrementer App</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <div id="controls">
            <button class="control-button" id="add-button" title="Increment Count"><mat-icon>add</mat-icon></button>
            <input type="number" id="increment-by" min="1" step="1" title="Increment By" value="1">
            <button class="control-button" id="remove-button" title="Decrement Count"><mat-icon>remove</mat-icon></button>
            <span id="current-count">Current Count:</span>
            <button class="control-button" id="reset-button" title="Reset Count">Reset</button>
        </div>
    </mat-card-content>
</mat-card>
